<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spotify</title>
    <link rel="stylesheet" href="log-in.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <main>
        <div class="login-wrapper">
            <div class="title">
                <i class="fa-brands fa-spotify"></i>
                <h1>Welcome back</h1>
            </div>
            <form action="">
                <div class="email">
                    <b>Email</b>
                    <input type="email" required>
                </div>

                <div class="buttons">
                    <button class="Continue">Continue</button>
                    <p>or</p>
                    <button class="Google-apple-Facebook"> <img src="https://wallpapercave.com/wp/wp2860517.jpg"
                            alt=""><span>Continue
                            with Google</span></button>
                    <button class="Google-apple-Facebook"> <img
                            src="https://i.pinimg.com/originals/7a/b2/61/7ab261c112429812160c05ad9f487c2f.jpg"
                            alt=""><span>Continue with Facebook</span></button>
                    <button class="Google-apple-Facebook"> <img
                            src="https://pngpix.com/images/thumbnail/apple-logo-black-background-jw0e3716wxz5qb3s.webp"
                            alt=""><span>Continue with Apple</span></button>
                </div>

                <div class="log-in">
                    <div class="top">
                        <p>Don't have an account?</p>
                        <a href="sign-up/sign-up.html">Sign up</a>
                    </div>
                    <p class="login-end">This site is protected by reCAPTCHA and the Google
                        Privacy Policy and Terms of Service apply.</p>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
